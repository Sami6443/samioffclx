<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMIOFFCLX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
    background:#050505;
    color:white;
    overflow:hidden;
}

/* ANIMATED GRADIENT BG */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 30% 30%, #0f2027, #000);
    z-index:-1;
}

/* HEADER */
header{
    text-align:center;
    margin-top:60px;
    animation:fadeIn 1.5s ease;
}

h1{
    font-size:3.5rem;
    letter-spacing:6px;
    background:linear-gradient(90deg,#00f0ff,#9d00ff);
    -webkit-background-clip:text;
    color:transparent;
}

.subtitle{
    opacity:0.6;
    margin-top:10px;
}

/* CHAT */
.chat-container{
    width:95%;
    max-width:550px;
    margin:40px auto;
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 60px rgba(0,255,255,0.08);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.chat-header{
    padding:15px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.chat-box{
    height:350px;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px 16px;
    margin:10px 0;
    border-radius:20px;
    max-width:75%;
    animation:fadeIn .4s ease;
}

.user{
    background:#00f0ff;
    color:black;
    margin-left:auto;
}

.ai{
    background:#1a1a1a;
}

/* TYPING DOTS */
.typing{
    display:flex;
    gap:5px;
}

.typing span{
    width:6px;
    height:6px;
    background:#aaa;
    border-radius:50%;
    animation:blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
    0%,80%,100%{opacity:0;}
    40%{opacity:1;}
}

/* INPUT */
.chat-input{
    display:flex;
    border-top:1px solid rgba(255,255,255,0.1);
}

.chat-input input{
    flex:1;
    padding:15px;
    background:transparent;
    border:none;
    color:white;
    outline:none;
}

.chat-input button{
    padding:15px 20px;
    border:none;
    cursor:pointer;
    background:linear-gradient(90deg,#00f0ff,#9d00ff);
    color:white;
}

/* FLOAT BUTTONS */
.floating{
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-decoration:none;
    box-shadow:0 0 20px rgba(0,255,255,0.6);
    transition:.3s;
}

.btn:hover{transform:scale(1.15);}

.whatsapp{background:#25D366;}
.instagram{background:#E1306C;}

/* FOOTER */
footer{
    text-align:center;
    opacity:.5;
    margin-top:20px;
}

/* ANIM */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <h1>SAMIOFFCLX</h1>
    <div class="subtitle">Something big is coming...</div>
</header>

<div class="chat-container">
    <div class="chat-header">SAMIOFFCLX AI</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="input" placeholder="Mesaj yaz...">
        <button onclick="send()">Gönder</button>
    </div>
</div>

<div class="floating">
    <a href="https://wa.me/905335959238" target="_blank" class="btn whatsapp">W</a>
    <a href="https://instagram.com/samiofflx" target="_blank" class="btn instagram">I</a>
</div>

<footer>
    © 2026 SAMIOFFCLX – All rights reserved
</footer>

<script>
const chatBox = document.getElementById("chatBox");

function addMessage(text, type){
    let msg=document.createElement("div");
    msg.className="message "+type;
    msg.innerText=text;
    chatBox.appendChild(msg);
    chatBox.scrollTop=chatBox.scrollHeight;
}

function typingIndicator(){
    let div=document.createElement("div");
    div.className="message ai typing";
    div.innerHTML="<span></span><span></span><span></span>";
    chatBox.appendChild(div);
    chatBox.scrollTop=chatBox.scrollHeight;
    return div;
}

async function send(){
    let input=document.getElementById("input");
    let text=input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    input.value="";

    let typing=typingIndicator();

    setTimeout(()=>{
        typing.remove();

        let fake=[
            "Sistem başlatılıyor...",
            "Yakında erişim açılacak.",
            "Veriler hazırlanıyor...",
            "Bu sadece başlangıç.",
            "SAMIOFFCLX aktif."
        ];

        addMessage(fake[Math.floor(Math.random()*fake.length)],"ai");
    },1500);
}

/* ENTER TUŞU */
document.getElementById("input").addEventListener("keypress",function(e){
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
