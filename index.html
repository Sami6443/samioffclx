<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samioffclx</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
/* Genel Ayarlar */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Orbitron',sans-serif;background:#0a0a0a;color:#fff;overflow-x:hidden;scroll-behavior:smooth;}
a{text-decoration:none;color:inherit;}
section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;}

/* Hero */
#hero{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);overflow:hidden;}
#hero h1{font-size:4rem;color:#9b59b6;animation:glow 2s ease-in-out infinite alternate;}
#hero h2{font-size:1.5rem;color:#fff;margin-top:1rem;}
@keyframes glow{from{text-shadow:0 0 5px #9b59b6,0 0 10px #9b59b6,0 0 20px #9b59b6;}to{text-shadow:0 0 20px #8e44ad,0 0 30px #8e44ad,0 0 50px #8e44ad;}}

/* Canvas */
canvas#bgCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
canvas#logoCanvas{position:absolute;top:50px;width:200px;height:200px;z-index:2;}

/* Contact */
#contact{background:#111;display:flex;flex-direction:column;align-items:center;gap:20px;padding:50px 0;}
.contact-icons{display:flex;gap:30px;}
.contact-icons a{font-size:2rem;transition:transform 0.3s;color:#9b59b6;}
.contact-icons a:hover{transform:scale(1.2);}

/* Chat */
#chat{background:#1a1a1a;padding:50px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;}
#chatBox{width:90%;max-width:600px;height:400px;background:#111;border-radius:15px;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.message{padding:10px 15px;border-radius:15px;max-width:70%;word-wrap:break-word;}
.user{background:#9b59b6;align-self:flex-end;color:#fff;}
.bot{background:#333;align-self:flex-start;color:#fff;}
#chatInput{display:flex;width:90%;max-width:600px;}
#chatInput input{flex:1;padding:10px 15px;border-radius:15px 0 0 15px;border:none;outline:none;}
#chatInput button{padding:10px 20px;border:none;border-radius:0 15px 15px 0;background:#9b59b6;color:#fff;cursor:pointer;transition:0.3s;}
#chatInput button:hover{background:#8e44ad;}

/* Music Button */
#musicBtn{position:fixed;bottom:20px;right:20px;padding:10px 15px;background:#9b59b6;border:none;border-radius:15px;color:#fff;cursor:pointer;transition:0.3s;z-index:10;}
#musicBtn:hover{background:#8e44ad;}
</style>
</head>
<body>

<!-- Hero -->
<section id="hero">
  <canvas id="bgCanvas"></canvas>
  <canvas id="logoCanvas"></canvas>
  <h1>samioffclx</h1>
  <h2>Digital Creator | AI Enthusiast</h2>
</section>

<!-- Contact -->
<section id="contact">
  <h2>Contact Me</h2>
  <div class="contact-icons">
    <a href="https://wa.me/905335959238" target="_blank">📱 WhatsApp</a>
    <a href="https://instagram.com/samioffcllx" target="_blank">📸 Instagram</a>
  </div>
</section>

<!-- Chat -->
<section id="chat">
  <h2>Chat with AI</h2>
  <div id="chatBox"></div>
  <div id="chatInput">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</section>

<!-- Music -->
<button id="musicBtn">🎵 Play Music</button>
<audio id="bgMusic" loop src="assets/music.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* Particle Background */
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<100;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,dx:(Math.random()-0.5)*1,dy:(Math.random()-0.5)*1});}
function animateParticles(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="#9b59b6";ctx.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>canvas.width)p.dx*=-1;if(p.y<0||p.y>canvas.height)p.dy*=-1;});requestAnimationFrame(animateParticles);}
animateParticles();

/* Three.js 3D Logo */
const logoCanvas=document.getElementById('logoCanvas');
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:logoCanvas,alpha:true});
renderer.setSize(200,200);
const geometry=new THREE.TorusGeometry(1,0.4,16,100);
const material=new THREE.MeshBasicMaterial({color:0x9b59b6,wireframe:true});
const torus=new THREE.Mesh(geometry,material);
scene.add(torus);
camera.position.z=5;
function animateLogo(){requestAnimationFrame(animateLogo);torus.rotation.x+=0.01;torus.rotation.y+=0.01;renderer.render(scene,camera);}
animateLogo();

/* Music Button */
const music=document.getElementById('bgMusic');
const musicBtn=document.getElementById('musicBtn');
musicBtn.onclick=()=>{music.paused?music.play():music.pause();};

/* Chat Function */
const chatBox=document.getElementById('chatBox');
async function sendMessage(){
  const input=document.getElementById('userInput');
  if(input.value.trim()==="") return;
  const userMsg=document.createElement('div');userMsg.className='message user';userMsg.textContent=input.value;
  chatBox.appendChild(userMsg);chatBox.scrollTop=chatBox.scrollHeight;

  const botMsg=document.createElement('div');botMsg.className='message bot';botMsg.textContent='Typing...';
  chatBox.appendChild(botMsg);chatBox.scrollTop=chatBox.scrollHeight;

  try{
    const res=await fetch('/.netlify/functions/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:input.value})
    });
    const data=await res.json();
    botMsg.textContent=data.reply||"Error: No reply from server.";
    chatBox.scrollTop=chatBox.scrollHeight;
  }catch(err){
    console.error(err);
    botMsg.textContent="Error: API request failed.";
  }
  input.value='';
}
</script>
</body>
</html>
