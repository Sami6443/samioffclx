<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>samioffclx</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Orbitron',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

/* ANA */
.container{
  text-align:center;
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 30px rgba(155,89,182,0.7);
}

/* KORKU */
#hack, #call{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

/* HACK */
#hack{
  background:black;
  color:red;
}

#bar{
  width:80%;
  height:20px;
  background:#333;
  margin-top:20px;
}
#progress{
  width:0%;
  height:100%;
  background:red;
}

/* ARAMA */
#call{
  background:black;
  color:white;
}

.call-box{
  text-align:center;
}

.call-name{
  font-size:28px;
  margin-bottom:10px;
}

.call-btn{
  margin-top:20px;
  padding:15px;
  background:red;
  border-radius:50%;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(-10px,10px);}
  50%{transform:translate(10px,-10px);}
  75%{transform:translate(-10px,10px);}
  100%{transform:translate(0,0);}
}
.shake{animation:shake 0.1s infinite;}
</style>
</head>

<body>

<div class="container">
  <h1>samioffcllx</h1>
  <p>Premium Site</p>
</div>

<!-- HACK -->
<div id="hack">
  <h2>⚠️ SİSTEM ELE GEÇİRİLDİ ⚠️</h2>

  <div id="bar">
    <div id="progress"></div>
  </div>

  <p id="status">Başlatılıyor...</p>
</div>

<!-- FAKE ARAMA -->
<div id="call">
  <div class="call-box">
    <div class="call-name">Bilinmeyen Numara</div>
    <div>Aranıyorsun...</div>
    <div class="call-btn">📞</div>
  </div>
</div>

<audio id="alarm" src="https://www.soundjay.com/misc/sounds/alarm-clock-01.mp3"></audio>
<audio id="ring" src="https://www.soundjay.com/phone/sounds/telephone-ring-01a.mp3"></audio>
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>

// 30 sn sonra başlar
setTimeout(function(){

  const hack=document.getElementById("hack");
  const progress=document.getElementById("progress");
  const status=document.getElementById("status");
  const alarm=document.getElementById("alarm");

  hack.style.display="flex";
  document.body.classList.add("shake");
  alarm.play();

  let w=0;
  let i=setInterval(function(){
    w+=2;
    progress.style.width=w+"%";

    if(w<30) status.innerText="Dosyalar çekiliyor...";
    else if(w<70) status.innerText="Kamera aktif 📷";
    else status.innerText="Telefon hackleniyor...";

    if(w>=100){
      clearInterval(i);

      // ARAMA BAŞLASIN
      hack.style.display="none";
      document.getElementById("call").style.display="flex";

      document.getElementById("ring").play();

      setTimeout(function(){
        document.getElementById("call").innerHTML="😂 ŞAKA YAPTIM 😂";
        document.body.classList.remove("shake");
        alarm.pause();

        setTimeout(()=>{
          document.getElementById("call").style.display="none";
          document.getElementById("music").play();
        },3000);

      },5000);
    }

  },100);

},30000);

</script>

</body>
</html>
