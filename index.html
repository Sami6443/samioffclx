<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMIOFFCLX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow-x: hidden;
}

/* PARALLAX BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding-top: 80px;
    animation: fadeIn 2s ease;
}

h1 {
    font-size: 3rem;
    letter-spacing: 5px;
    background: linear-gradient(90deg, #00f0ff, #9d00ff);
    -webkit-background-clip: text;
    color: transparent;
}

p {
    opacity: 0.7;
    margin-top: 10px;
}

/* CHAT BOX */
.chat-container {
    width: 90%;
    max-width: 500px;
    margin: 50px auto;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(0,255,255,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeIn 2s ease;
}

.chat-header {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-weight: 600;
}

.chat-box {
    height: 300px;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin: 10px 0;
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 80%;
    animation: fadeIn 0.5s ease;
}

.user {
    background: #00f0ff;
    color: black;
    margin-left: auto;
}

.ai {
    background: #222;
}

/* INPUT */
.chat-input {
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.chat-input input {
    flex: 1;
    padding: 15px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
}

.chat-input button {
    padding: 15px;
    border: none;
    background: linear-gradient(90deg, #00f0ff, #9d00ff);
    color: white;
    cursor: pointer;
}

/* FLOAT BUTTONS */
.floating {
    position: fixed;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    bottom: 20px;
}

.btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

.whatsapp {
    background: #25D366;
}

.instagram {
    background: #E1306C;
}

/* FOOTER */
footer {
    text-align: center;
    margin: 40px 0;
    opacity: 0.5;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <h1>SAMIOFFCLX</h1>
    <p>Something big is coming...</p>
</header>

<div class="chat-container">
    <div class="chat-header">SAMIOFFCLX AI</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Mesaj yaz...">
        <button onclick="sendMessage()">Gönder</button>
    </div>
</div>

<div class="floating">
    <a href="https://wa.me/905335959238" target="_blank" class="btn whatsapp">W</a>
    <a href="https://instagram.com/samiofflx" target="_blank" class="btn instagram">I</a>
</div>

<footer>
    © 2026 SAMIOFFCLX – All rights reserved
</footer>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();
    if(message === "") return;

    addMessage(message, "user");
    input.value = "";

    setTimeout(() => {
        let responses = [
            "Bu sadece başlangıç...",
            "Sisteme erişim hazırlanıyor...",
            "Yakında çok büyük bir şey geliyor.",
            "SAMIOFFCLX seni izliyor...",
            "Hazır ol."
        ];
        let random = responses[Math.floor(Math.random() * responses.length)];
        addMessage(random, "ai");
    }, 1000);
}

function addMessage(text, type) {
    let chatBox = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
